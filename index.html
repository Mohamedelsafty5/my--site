<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mohamed Elsafty - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bg-animate {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: move 25s infinite alternate ease-in-out;
        }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(15vw, 15vh) scale(1.3); }
        }

        .snap-container {
            height: 100dvh;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .section {
            min-height: 100dvh;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 1rem;
            position: relative;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .fluid-heading {
            font-size: clamp(2.5rem, 7vw, 6rem);
            line-height: 1;
        }

        .gallery-item {
            aspect-ratio: 16/9;
            overflow: hidden;
            border-radius: 1rem;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .gallery-item:hover {
            transform: scale(1.02);
            border-color: rgba(167, 139, 250, 0.5);
        }
    </style>
</head>
<body>
    <div class="bg-animate">
        <div class="blob w-72 h-72 bg-violet-600 top-[-5%] left-[-5%]"></div>
        <div class="blob w-96 h-96 bg-blue-600 bottom-[-10%] right-[-5%]" style="animation-delay: -7s;"></div>
        <div class="blob w-64 h-64 bg-indigo-500 top-[30%] left-[20%]" style="animation-delay: -12s;"></div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);

            return <i data-lucide={name.toLowerCase()} className={className}></i>;
        };

        const App = () => {
            const [active, setActive] = useState(0);
            
            const userData = {
                name: "MOHAMED",
                surname: "ELSAFTY",
                tagline: "Professional Media Designer & PC Builder",
                birth: "21/03/2008",
                about: "I am an 18-year-old student at Alexandria Faculty of Engineering. I combine the analytical mindset of a future Mechanical Engineer with the creative vision of a professional media designer. I've been building PCs and creating content since 2020.",
                skills: [
                    { n: "Video Editing (Premiere Pro)", l: 95, desc: "Excellent" },
                    { n: "PC Building & Repair", l: 95, desc: "Excellent" },
                    { n: "Graphic Design (Photoshop)", l: 75, desc: "Intermediate" },
                    { n: "Coding (Python / Web)", l: 70, desc: "Intermediate" }
                ],
                courses: [
                    { title: "DECI Lv1 & Lv2", host: "Udacity / MCIT", d: "Computing, Networks, Advanced Python & Web Design" },
                    { title: "AWS AI Foundations", host: "Amazon", d: "AI Basics and Cloud Computing" },
                    { title: "IBM Emerging Tech", host: "IBM", d: "Advanced Computing Systems" },
                    { title: "Blockchain & Crypto", host: "Open Campus", d: "Digital Economy & Currency" }
                ],
                projects: [
                    { title: "Interactive Python Game", desc: "Complex logic with multiple routes.", link: "https://drive.google.com/file/d/1O0ITIxDxZUPRDRuwLoK6Ot91TBbzwA5m/view", hasLink: true },
                    { title: "Clash Craft YT", desc: "Content creator for games since 2020.", link: "https://www.youtube.com/@channel-clash-craft", hasLink: true },
                    { title: "Web Development", desc: "Custom stores and portfolio pages.", link: "#", hasLink: false },
                    { title: "Visual Art & Photoshop", desc: "Professional thumbnail editing and digital art manipulations.", hasLink: false }
                ],
                gallery: ["1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg", "6.jpg", "7.jpg", "8.jpg", "9.jpg", "10.jpg"],
                services: [
                    { title: "Video Production", icon: "video", desc: "High-end editing & storytelling" },
                    { title: "Visual Design", icon: "palette", desc: "Thumbnails & social media graphics" },
                    { title: "Custom PC Builds", icon: "cpu", desc: "Tailored high-performance rigs" },
                    { title: "Technical Support", icon: "wrench", desc: "Hardware repair & troubleshooting" }
                ],
                links: {
                    email: "mailto:rqmym43@gmail.com",
                    linkedin: "https://www.linkedin.com/in/mohamed-elsafty-01146399477/",
                    github: "https://github.com/Mohamedelsafty5",
                    youtube: "https://www.youtube.com/@channel-clash-craft"
                }
            };

            const handleScroll = (e) => {
                const index = Math.round(e.target.scrollTop / window.innerHeight);
                setActive(index);
            };

            return (
                <div className="h-[100dvh] w-full flex flex-col md:flex-row overflow-hidden">
                    {/* Navigation Dots */}
                    <div className="fixed left-8 top-1/2 -translate-y-1/2 z-50 hidden lg:flex flex-col gap-6">
                        {[0,1,2,3,4,5,6,7].map(i => (
                            <div key={i} className={`w-1 rounded-full transition-all duration-500 ${active === i ? 'h-10 bg-violet-400' : 'h-3 bg-white/10'}`} />
                        ))}
                    </div>

                    <div className="flex-1 snap-container no-scrollbar" onScroll={handleScroll}>
                        
                        {/* Hero Section */}
                        <section className="section">
                            <div className="max-w-6xl w-full grid md:grid-cols-2 gap-12 items-center px-4">
                                <div className="text-center md:text-left order-2 md:order-1">
                                    <h1 className="fluid-heading font-black tracking-tighter uppercase mb-6">
                                        {userData.name}<br/>
                                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-violet-400 via-indigo-400 to-blue-400">{userData.surname}</span>
                                    </h1>
                                    <p className="text-slate-400 text-lg md:text-2xl font-light leading-relaxed">
                                        {userData.tagline}
                                    </p>
                                </div>
                                <div className="order-1 md:order-2 flex justify-center">
                                    <div className="relative glass p-3 rounded-full md:rounded-[3rem]">
                                        <img src="profile.jpg" alt="Profile" 
                                            onError={(e) => e.target.src="https://via.placeholder.com/400?text=Mohamed"}
                                            className="w-48 h-48 sm:w-64 sm:h-64 md:w-96 md:h-96 object-cover rounded-full md:rounded-[2.5rem] shadow-2xl" />
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* About Section */}
                        <section className="section">
                            <div className="max-w-4xl w-full px-4">
                                <h2 className="text-4xl md:text-6xl font-black mb-10 italic">WHY <span className="text-violet-400">ME?</span></h2>
                                <div className="glass p-8 md:p-12 rounded-[2.5rem] space-y-8">
                                    <p className="text-lg md:text-xl text-slate-300 leading-relaxed font-light">
                                        {userData.about}
                                    </p>
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                        <div className="bg-white/5 p-5 rounded-2xl border border-white/10">
                                            <span className="text-[10px] text-violet-400 uppercase font-black block mb-2 tracking-widest text-center">Birth</span>
                                            <span className="text-xl font-bold block text-center">{userData.birth}</span>
                                        </div>
                                        <div className="bg-white/5 p-5 rounded-2xl border border-white/10">
                                            <span className="text-[10px] text-violet-400 uppercase font-black block mb-2 tracking-widest text-center">Education</span>
                                            <span className="text-xl font-bold block text-center">Faculty of Eng.</span>
                                        </div>
                                        <div className="bg-white/5 p-5 rounded-2xl border border-white/10">
                                            <span className="text-[10px] text-violet-400 uppercase font-black block mb-2 tracking-widest text-center">Languages</span>
                                            <span className="text-xl font-bold block text-center">EN, AR, FR</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Skills Section */}
                        <section className="section">
                            <div className="max-w-4xl w-full px-6">
                                <h2 className="text-4xl md:text-6xl font-black mb-12 text-center">CORE <span className="text-indigo-400">SKILLS</span></h2>
                                <div className="grid gap-10">
                                    {userData.skills.map((s, i) => (
                                        <div key={i}>
                                            <div className="flex justify-between mb-3 items-end">
                                                <span className="font-bold text-lg md:text-xl">{s.n}</span>
                                                <span className="text-violet-400 text-xs font-black uppercase tracking-widest">{s.desc}</span>
                                            </div>
                                            <div className="h-3 bg-white/5 rounded-full overflow-hidden border border-white/5">
                                                <div className="h-full bg-gradient-to-r from-violet-600 via-indigo-500 to-blue-500 transition-all duration-[1.5s] ease-out" 
                                                     style={{width: active >= 2 ? `${s.l}%` : '0%'}} />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* Services Section */}
                        <section className="section">
                            <div className="max-w-6xl w-full px-4 text-center">
                                <h2 className="text-4xl md:text-6xl font-black mb-12 italic uppercase">Services</h2>
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                                    {userData.services.map((s, i) => (
                                        <div key={i} className="glass p-6 md:p-8 rounded-[2.5rem] group hover:bg-white/5 transition-all">
                                            <div className="w-14 h-14 bg-violet-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform">
                                                <Icon name={s.icon} className="w-6 h-6 text-violet-400" />
                                            </div>
                                            <h3 className="font-bold text-lg mb-2">{s.title}</h3>
                                            <p className="text-slate-500 text-xs">{s.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* Learning Path */}
                        <section className="section">
                            <div className="max-w-6xl w-full px-4">
                                <h2 className="text-4xl md:text-6xl font-black mb-12 uppercase">Learning <span className="text-blue-400">Path</span></h2>
                                <div className="grid sm:grid-cols-2 gap-6">
                                    {userData.courses.map((c, i) => (
                                        <div key={i} className="glass p-6 md:p-8 rounded-[2rem] border-l-4 border-l-blue-500/50">
                                            <span className="text-[10px] font-black uppercase tracking-[0.2em] text-blue-400 mb-2 block">{c.host}</span>
                                            <h4 className="text-lg font-bold mb-2">{c.title}</h4>
                                            <p className="text-slate-400 text-sm font-light">{c.d}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* Project Vault */}
                        <section className="section">
                            <div className="max-w-6xl w-full px-4">
                                <h2 className="text-4xl md:text-6xl font-black mb-12 text-right uppercase italic">Project <span className="text-violet-400">Vault</span></h2>
                                <div className="grid sm:grid-cols-2 gap-6">
                                    {userData.projects.map((p, i) => (
                                        <div key={i} className="h-full">
                                            {p.hasLink ? (
                                                <a href={p.link} target="_blank" className="glass p-8 rounded-[2.5rem] flex justify-between items-center group hover:bg-white/10 transition-all h-full">
                                                    <div>
                                                        <h4 className="text-xl font-bold group-hover:text-violet-400 transition-colors mb-2">{p.title}</h4>
                                                        <p className="text-slate-500 text-sm">{p.desc}</p>
                                                    </div>
                                                    <div className="w-10 h-10 rounded-full glass flex items-center justify-center group-hover:bg-violet-500 group-hover:text-white transition-all">
                                                        <Icon name="arrow-up-right" className="w-4 h-4" />
                                                    </div>
                                                </a>
                                            ) : (
                                                <div className="glass p-8 rounded-[2.5rem] h-full">
                                                    <h4 className="text-xl font-bold mb-2 text-violet-400">{p.title}</h4>
                                                    <p className="text-slate-400 text-sm">{p.desc}</p>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* Works Gallery */}
                        <section className="section">
                            <div className="max-w-6xl w-full px-4">
                                <h2 className="text-4xl md:text-6xl font-black mb-10 text-center uppercase">Some of my <span className="text-indigo-400 italic">Works</span></h2>
                                <div className="glass p-6 md:p-8 rounded-[3rem] max-h-[70vh] overflow-y-auto no-scrollbar">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {userData.gallery.map((img, i) => (
                                            <div key={i} className="gallery-item">
                                                <img src={img} alt={`Work ${i+1}`} className="w-full h-full object-cover opacity-80 hover:opacity-100 transition-opacity" />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Contact Section */}
                        <section className="section">
                            <div className="max-w-4xl w-full text-center px-4 space-y-12">
                                <h2 className="fluid-heading font-black italic tracking-tighter leading-none uppercase">Let's<br/>Build It</h2>
                                <div className="flex flex-wrap justify-center gap-6">
                                    <a href={userData.links.email} className="glass w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center hover:scale-110 hover:bg-violet-500/20 transition-all">
                                        <Icon name="mail" className="w-6 h-6" />
                                    </a>
                                    <a href={userData.links.linkedin} target="_blank" className="glass w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center hover:scale-110 hover:bg-blue-600/20 transition-all text-blue-500">
                                        <Icon name="linkedin" className="w-6 h-6" />
                                    </a>
                                    <a href={userData.links.github} target="_blank" className="glass w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center hover:scale-110 hover:bg-slate-500/20 transition-all">
                                        <Icon name="github" className="w-6 h-6" />
                                    </a>
                                    <a href={userData.links.youtube} target="_blank" className="glass w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center hover:scale-110 hover:bg-red-500/20 transition-all text-red-500">
                                        <Icon name="youtube" className="w-6 h-6" />
                                    </a>
                                </div>
                                <div className="pt-10 border-t border-white/5">
                                    <p className="text-slate-500 font-black tracking-[0.5em] uppercase text-[10px] md:text-xs">
                                        Alexandria, Egypt • 01146399477
                                    </p>
                                </div>
                            </div>
                        </section>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
