<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mohamed Elsafty - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Animated Background */
        .bg-animate {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: move 25s infinite alternate ease-in-out;
        }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(15vw, 15vh) scale(1.3); }
        }

        /* Smooth scroll and snap */
        .snap-container {
            height: 100dvh;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }
        .section {
            height: 100dvh;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Custom Responsive Typography */
        .fluid-heading {
            font-size: clamp(2.5rem, 8vw, 7rem);
            line-height: 0.9;
        }
    </style>
</head>
<body>
    <div class="bg-animate">
        <div class="blob w-72 h-72 bg-violet-600 top-[-5%] left-[-5%]"></div>
        <div class="blob w-96 h-96 bg-blue-600 bottom-[-10%] right-[-5%]" style="animation-delay: -7s;"></div>
        <div class="blob w-64 h-64 bg-indigo-500 top-[30%] left-[20%]" style="animation-delay: -12s;"></div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name.toLowerCase());
                    if (className) i.className = className;
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons();
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center" />;
        };

        const App = () => {
            const [active, setActive] = useState(0);
            
            const userData = {
                name: "MOHAMED",
                surname: "ELSAFTY",
                tagline: "Professional Media Designer & PC Builder",
                birth: "21/03/2008",
                about: "I am an 18-year-old engineering student at Alexandria Faculty of Engineering. I combine analytical problem-solving as a future Mechanical Engineer with the creative vision of a high-production media designer.",
                skills: [
                    { n: "Video Editing (PR)", l: 95, desc: "Excellent" },
                    { n: "PC Building", l: 95, desc: "Excellent" },
                    { n: "Photoshop (PS)", l: 75, desc: "Intermediate" },
                    { n: "Coding (Python/Web)", l: 70, desc: "Intermediate" }
                ],
                projects: [
                    { title: "Interactive Python Game", desc: "Complex logic with multiple routes.", link: "https://drive.google.com/file/d/1O0ITIxDxZUPRDRuwLoK6Ot91TBbzwA5m/view" },
                    { title: "Web Development", desc: "Custom stores and landing pages.", link: "#" },
                    { title: "Clash Craft YT", desc: "Content creation since 2020.", link: "https://www.youtube.com/@channel-clash-craft" },
                    { title: "Hardware Archive", desc: "PC Builds and troubleshooting.", link: "https://drive.google.com/drive/folders/11yhcV8lQy3ThGtOJBIR3dgWszrwJvNyE" }
                ],
                services: [
                    { title: "Video Production", icon: "Video", desc: "High-end editing in Premiere Pro" },
                    { title: "Brand Design", icon: "Palette", desc: "Thumbnails and social graphics" },
                    { title: "Tech Support", icon: "Wrench", desc: "Hardware repair & troubleshooting" },
                    { title: "Custom PCs", icon: "Cpu", desc: "Professional high-spec builds" }
                ]
            };

            const handleScroll = (e) => {
                const index = Math.round(e.target.scrollTop / window.innerHeight);
                setActive(index);
            };

            return (
                <div className="h-[100dvh] w-full flex flex-col md:flex-row overflow-hidden">
                    {/* Floating Nav */}
                    <div className="fixed right-6 top-1/2 -translate-y-1/2 z-50 hidden md:flex flex-col gap-4">
                        {[0,1,2,3,4,5].map(i => (
                            <div key={i} className={`w-1 transition-all duration-300 rounded-full ${active === i ? 'h-8 bg-violet-400' : 'h-4 bg-white/20'}`} />
                        ))}
                    </div>

                    <div className="flex-1 snap-container no-scrollbar" onScroll={handleScroll}>
                        
                        {/* HERO */}
                        <section className="section">
                            <div className="max-w-6xl w-full grid md:grid-cols-2 gap-8 items-center">
                                <div className="text-center md:text-left order-2 md:order-1">
                                    <h1 className="fluid-heading font-black tracking-tighter uppercase mb-4">
                                        {userData.name}<br/>
                                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-blue-400">{userData.surname}</span>
                                    </h1>
                                    <p className="text-slate-400 text-lg md:text-2xl font-light">{userData.tagline}</p>
                                </div>
                                <div className="order-1 md:order-2 flex justify-center">
                                    <div className="relative glass p-2 rounded-full md:rounded-[3rem]">
                                        <img src="profile.jpg" alt="Profile" 
                                            onError={(e) => e.target.src="https://via.placeholder.com/400?text=Mohamed"}
                                            className="w-48 h-48 md:w-80 md:h-80 object-cover rounded-full md:rounded-[2.5rem]" />
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* WHY ME */}
                        <section className="section">
                            <div className="max-w-4xl w-full">
                                <h2 className="text-4xl md:text-6xl font-black mb-8 italic">WHY <span className="text-violet-400">ME?</span></h2>
                                <div className="glass p-8 rounded-[2rem] space-y-6">
                                    <p className="text-lg text-slate-300 leading-relaxed">{userData.about}</p>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-white/5 p-4 rounded-2xl border border-white/10">
                                            <span className="text-xs text-violet-400 uppercase font-bold block mb-1">Born</span>
                                            <span className="text-xl font-bold">{userData.birth}</span>
                                        </div>
                                        <div className="bg-white/5 p-4 rounded-2xl border border-white/10">
                                            <span className="text-xs text-violet-400 uppercase font-bold block mb-1">Goal</span>
                                            <span className="text-xl font-bold">Mechanical Engineer</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* SKILLS */}
                        <section className="section">
                            <div className="max-w-4xl w-full">
                                <h2 className="text-4xl md:text-6xl font-black mb-10 text-center">SKILLS</h2>
                                <div className="space-y-8">
                                    {userData.skills.map((s, i) => (
                                        <div key={i}>
                                            <div className="flex justify-between mb-2">
                                                <span className="font-bold">{s.n}</span>
                                                <span className="text-violet-400 text-sm font-bold uppercase">{s.desc}</span>
                                            </div>
                                            <div className="h-2 bg-white/10 rounded-full overflow-hidden">
                                                <div className="h-full bg-gradient-to-r from-violet-500 to-blue-500 transition-all duration-1000" style={{width: active >= 2 ? `${s.l}%` : '0%'}} />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* SERVICES */}
                        <section className="section">
                            <div className="max-w-6xl w-full">
                                <h2 className="text-4xl md:text-6xl font-black mb-10 text-center md:text-left">SERVICES</h2>
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                                    {userData.services.map((s, i) => (
                                        <div key={i} className="glass p-6 md:p-8 rounded-[2rem] text-center hover:bg-white/10 transition-all">
                                            <div className="w-12 h-12 md:w-16 md:h-16 bg-violet-500/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                                <Icon name={s.icon} className="w-6 h-6 md:w-8 md:h-8 text-violet-400" />
                                            </div>
                                            <h3 className="font-bold text-lg mb-2">{s.title}</h3>
                                            <p className="text-slate-500 text-xs">{s.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* PROJECTS */}
                        <section className="section">
                            <div className="max-w-6xl w-full">
                                <h2 className="text-4xl md:text-6xl font-black mb-10">PROJECTS</h2>
                                <div className="grid sm:grid-cols-2 gap-4">
                                    {userData.projects.map((p, i) => (
                                        <a key={i} href={p.link} target="_blank" className="glass p-6 rounded-3xl flex justify-between items-center group hover:border-violet-500/50 transition-all">
                                            <div>
                                                <h4 className="text-xl font-bold group-hover:text-violet-400 transition-colors">{p.title}</h4>
                                                <p className="text-slate-500 text-sm">{p.desc}</p>
                                            </div>
                                            <Icon name="ArrowUpRight" className="text-slate-600 group-hover:text-white" />
                                        </a>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* CONTACT */}
                        <section className="section">
                            <div className="text-center space-y-12">
                                <h2 className="fluid-heading font-black italic">LET'S WORK</h2>
                                <div className="flex flex-wrap justify-center gap-6">
                                    <a href="mailto:mohamedelsafty@gmail.com" className="glass w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center hover:scale-110 transition-all"><Icon name="Mail" /></a>
                                    <a href="https://wa.me/201146399477" target="_blank" className="glass w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center hover:scale-110 transition-all text-green-400"><Icon name="MessageCircle" /></a>
                                    <a href="https://github.com/Mohamedelsafty5" target="_blank" className="glass w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center hover:scale-110 transition-all"><Icon name="Github" /></a>
                                </div>
                                <p className="text-slate-500 font-bold tracking-widest uppercase text-xs md:text-sm">Alexandria, Egypt • 01146399477</p>
                            </div>
                        </section>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
