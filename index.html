<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mohamed Elsafty - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Animated Background */
        .bg-animate {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: move 25s infinite alternate ease-in-out;
        }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(15vw, 15vh) scale(1.3); }
        }

        /* Smooth scroll and snap */
        .snap-container {
            height: 100dvh;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }
        .section {
            min-height: 100dvh;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            position: relative;
        }

        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Typography - Improved for PC */
        .fluid-heading {
            font-size: clamp(2.5rem, 7vw, 6rem);
            line-height: 1;
        }
    </style>
</head>
<body>
    <div class="bg-animate">
        <div class="blob w-72 h-72 bg-violet-600 top-[-5%] left-[-5%]"></div>
        <div class="blob w-96 h-96 bg-blue-600 bottom-[-10%] right-[-5%]" style="animation-delay: -7s;"></div>
        <div class="blob w-64 h-64 bg-indigo-500 top-[30%] left-[20%]" style="animation-delay: -12s;"></div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name.toLowerCase());
                    if (className) i.className = className;
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons();
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center" />;
        };

        const App = () => {
            const [active, setActive] = useState(0);
            
            const userData = {
                name: "MOHAMED",
                surname: "ELSAFTY",
                tagline: "Professional Media Designer & PC Builder",
                birth: "21/03/2008",
                about: "I am an 18-year-old student at Alexandria Faculty of Engineering. I combine the analytical mindset of a future Mechanical Engineer with the creative vision of a professional media designer. I've been building PCs and creating content since 2020.",
                skills: [
                    { n: "Video Editing (Premiere Pro)", l: 95, desc: "Excellent" },
                    { n: "PC Building & Repair", l: 95, desc: "Excellent" },
                    { n: "Graphic Design (Photoshop)", l: 75, desc: "Intermediate" },
                    { n: "Coding (Python / Web)", l: 70, desc: "Intermediate" }
                ],
                courses: [
                    { title: "DECI Lv1 & Lv2", host: "Udacity / MCIT", d: "Computing, Networks, Advanced Python & Web Design" },
                    { title: "AWS AI Foundations", host: "Amazon", d: "AI Basics and Cloud Computing" },
                    { title: "IBM Emerging Tech", host: "IBM", d: "Advanced Computing Systems" },
                    { title: "Blockchain & Crypto", host: "Open Campus", d: "Digital Economy & Currency" }
                ],
                projects: [
                    { title: "Interactive Python Game", desc: "Complex logic with multiple routes.", link: "https://drive.google.com/file/d/1O0ITIxDxZUPRDRuwLoK6Ot91TBbzwA5m/view" },
                    { title: "Clash Craft YT", desc: "Content creator for games since 2020.", link: "https://www.youtube.com/@channel-clash-craft" },
                    { title: "Web Development", desc: "Custom stores and portfolio pages.", link: "#" },
                    { title: "Hardware Archive", desc: "Collection of custom PC builds.", link: "https://drive.google.com/drive/folders/11yhcV8lQy3ThGtOJBIR3dgWszrwJvNyE" }
                ],
                services: [
                    { title: "Video Production", icon: "Video", desc: "High-end editing & storytelling" },
                    { title: "Visual Design", icon: "Palette", desc: "Thumbnails & social media graphics" },
                    { title: "Custom PC Builds", icon: "Cpu", desc: "Tailored high-performance rigs" },
                    { title: "Technical Support", icon: "Wrench", desc: "Hardware repair & troubleshooting" }
                ]
            };

            const handleScroll = (e) => {
                const index = Math.round(e.target.scrollTop / window.innerHeight);
                setActive(index);
            };

            return (
                <div className="h-[100dvh] w-full flex flex-col md:flex-row overflow-hidden">
                    {/* PC Navigation Sidebar */}
                    <div className="fixed left-8 top-1/2 -translate-y-1/2 z-50 hidden lg:flex flex-col gap-8">
                        {[0,1,2,3,4,5,6].map(i => (
                            <div key={i} className={`w-1 rounded-full transition-all duration-500 ${active === i ? 'h-12 bg-violet-400' : 'h-4 bg-white/10'}`} />
                        ))}
                    </div>

                    <div className="flex-1 snap-container no-scrollbar" onScroll={handleScroll}>
                        
                        {/* 1. HERO */}
                        <section className="section">
                            <div className="max-w-6xl w-full grid md:grid-cols-2 gap-12 items-center">
                                <div className="text-center md:text-left order-2 md:order-1">
                                    <h1 className="fluid-heading font-black tracking-tighter uppercase mb-6">
                                        {userData.name}<br/>
                                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-violet-400 via-indigo-400 to-blue-400">{userData.surname}</span>
                                    </h1>
                                    <p className="text-slate-400 text-lg md:text-2xl font-light max-w-lg mx-auto md:mx-0 leading-relaxed">
                                        {userData.tagline}
                                    </p>
                                </div>
                                <div className="order-1 md:order-2 flex justify-center">
                                    <div className="relative glass p-3 rounded-full md:rounded-[3rem]">
                                        <img src="profile.jpg" alt="Profile" 
                                            onError={(e) => e.target.src="https://via.placeholder.com/400?text=Mohamed"}
                                            className="w-48 h-48 sm:w-64 sm:h-64 md:w-96 md:h-96 object-cover rounded-full md:rounded-[2.5rem] shadow-2xl" />
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* 2. WHY ME (About) */}
                        <section className="section">
                            <div className="max-w-4xl w-full">
                                <h2 className="text-4xl md:text-6xl font-black mb-10 italic">WHY <span className="text-violet-400">ME?</span></h2>
                                <div className="glass p-8 md:p-12 rounded-[2.5rem] space-y-8">
                                    <p className="text-lg md:text-xl text-slate-300 leading-relaxed font-light">
                                        {userData.about}
                                    </p>
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                        <div className="bg-white/5 p-5 rounded-2xl border border-white/10">
                                            <span className="text-xs text-violet-400 uppercase font-black block mb-2 tracking-widest">Birth</span>
                                            <span className="text-xl font-bold">{userData.birth}</span>
                                        </div>
                                        <div className="bg-white/5 p-5 rounded-2xl border border-white/10">
                                            <span className="text-xs text-violet-400 uppercase font-black block mb-2 tracking-widest">Education</span>
                                            <span className="text-xl font-bold">Mechanical Eng.</span>
                                        </div>
                                        <div className="bg-white/5 p-5 rounded-2xl border border-white/10">
                                            <span className="text-xs text-violet-400 uppercase font-black block mb-2 tracking-widest">Languages</span>
                                            <span className="text-xl font-bold text-sm">EN, AR, FR</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* 3. SKILLS */}
                        <section className="section">
                            <div className="max-w-4xl w-full px-4">
                                <h2 className="text-4xl md:text-6xl font-black mb-12 text-center">CORE <span className="text-indigo-400">SKILLS</span></h2>
                                <div className="grid gap-10">
                                    {userData.skills.map((s, i) => (
                                        <div key={i} className="group">
                                            <div className="flex justify-between mb-3 items-end">
                                                <span className="font-bold text-lg md:text-xl">{s.n}</span>
                                                <span className="text-violet-400 text-sm font-black uppercase tracking-widest">{s.desc}</span>
                                            </div>
                                            <div className="h-3 bg-white/5 rounded-full overflow-hidden border border-white/5">
                                                <div className="h-full bg-gradient-to-r from-violet-600 via-indigo-500 to-blue-500 transition-all duration-[1.5s] ease-out" 
                                                     style={{width: active >= 2 ? `${s.l}%` : '0%'}} />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* 4. SERVICES */}
                        <section className="section">
                            <div className="max-w-6xl w-full">
                                <h2 className="text-4xl md:text-6xl font-black mb-12 text-center italic">SERVICES</h2>
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                                    {userData.services.map((s, i) => (
                                        <div key={i} className="glass p-8 rounded-[3rem] text-center hover:bg-white/5 transition-all group">
                                            <div className="w-16 h-16 bg-violet-500/10 rounded-3xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform">
                                                <Icon name={s.icon} className="w-8 h-8 text-violet-400" />
                                            </div>
                                            <h3 className="font-bold text-xl mb-3">{s.title}</h3>
                                            <p className="text-slate-500 text-sm leading-tight">{s.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* 5. EDUCATION & COURSES */}
                        <section className="section">
                            <div className="max-w-6xl w-full">
                                <h2 className="text-4xl md:text-6xl font-black mb-12">LEARNING <span className="text-blue-400">PATH</span></h2>
                                <div className="grid sm:grid-cols-2 gap-6">
                                    {userData.courses.map((c, i) => (
                                        <div key={i} className="glass p-6 md:p-8 rounded-[2rem] border-l-4 border-l-blue-500/50">
                                            <span className="text-[10px] font-black uppercase tracking-[0.2em] text-blue-400 mb-2 block">{c.host}</span>
                                            <h4 className="text-xl font-bold mb-2">{c.title}</h4>
                                            <p className="text-slate-400 text-sm">{c.d}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* 6. PROJECTS */}
                        <section className="section">
                            <div className="max-w-6xl w-full">
                                <h2 className="text-4xl md:text-6xl font-black mb-12 text-right">PROJECT <span className="text-violet-400">VAULT</span></h2>
                                <div className="grid sm:grid-cols-2 gap-6">
                                    {userData.projects.map((p, i) => (
                                        <a key={i} href={p.link} target="_blank" className="glass p-8 rounded-[2.5rem] flex justify-between items-center group hover:bg-white/10 transition-all">
                                            <div>
                                                <h4 className="text-2xl font-bold group-hover:text-violet-400 transition-colors mb-2">{p.title}</h4>
                                                <p className="text-slate-500 text-sm">{p.desc}</p>
                                            </div>
                                            <div className="w-12 h-12 rounded-full glass flex items-center justify-center group-hover:bg-violet-500 group-hover:text-white transition-all">
                                                <Icon name="ArrowUpRight" className="w-5 h-5" />
                                            </div>
                                        </a>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* 7. CONTACT */}
                        <section className="section">
                            <div className="max-w-4xl w-full text-center space-y-16">
                                <h2 className="fluid-heading font-black italic tracking-tighter leading-none">LET'S<br/>BUILD IT</h2>
                                
                                <div className="flex flex-wrap justify-center gap-8">
                                    <a href={`mailto:mohamedelsafty@gmail.com`} className="glass w-20 h-20 md:w-24 md:h-24 rounded-full flex items-center justify-center hover:scale-110 hover:bg-violet-500/20 transition-all">
                                        <Icon name="Mail" className="w-8 h-8" />
                                    </a>
                                    <a href="https://wa.me/201146399477" target="_blank" className="glass w-20 h-20 md:w-24 md:h-24 rounded-full flex items-center justify-center hover:scale-110 hover:bg-green-500/20 transition-all text-green-400">
                                        <Icon name="MessageCircle" className="w-8 h-8" />
                                    </a>
                                    <a href="https://github.com/Mohamedelsafty5" target="_blank" className="glass w-20 h-20 md:w-24 md:h-24 rounded-full flex items-center justify-center hover:scale-110 hover:bg-slate-500/20 transition-all">
                                        <Icon name="Github" className="w-8 h-8" />
                                    </a>
                                    <a href="https://www.youtube.com/@channel-clash-craft" target="_blank" className="glass w-20 h-20 md:w-24 md:h-24 rounded-full flex items-center justify-center hover:scale-110 hover:bg-red-500/20 transition-all text-red-500">
                                        <Icon name="Youtube" className="w-8 h-8" />
                                    </a>
                                </div>

                                <div className="pt-10 border-t border-white/5">
                                    <p className="text-slate-500 font-black tracking-[0.5em] uppercase text-sm">
                                        Alexandria, Egypt • 01146399477
                                    </p>
                                </div>
                            </div>
                        </section>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
